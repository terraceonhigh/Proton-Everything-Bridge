# Proton DAV Server — Per-User Bridge Template
#
# This file is NOT used directly. The dashboard provisions each user's
# isolated bridge stack via:
#
#   docker compose -p user-{name} -f docker-compose.user.yml up -d
#
# Each user gets their own container, volume, and Proton credentials.
# The container joins the shared network so Caddy can route to it.

services:
  proton-bridge:
    build:
      context: ./containers/proton-bridge
    restart: unless-stopped
    volumes:
      - proton_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1143"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - proton-shared

volumes:
  proton_data:

networks:
  proton-shared:
    external: true
