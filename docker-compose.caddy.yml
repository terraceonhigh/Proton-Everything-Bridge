# Proton DAV Server — Shared Infrastructure
#
# Runs the reverse proxy (Caddy) and web dashboard.
# Per-user bridge stacks are managed by the dashboard via docker-compose.user.yml.
#
# Quick start:
#   cp .env.example .env
#   # Edit .env with your domain, credentials, and access mode
#   docker compose -f docker-compose.caddy.yml up -d
#   # Then open https://your-domain/ to add accounts

services:
  # ── Reverse Proxy / Gateway ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:443:443"
      - "${BIND_ADDRESS:-0.0.0.0}:80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - AUTH_USER=${AUTH_USER}
      - AUTH_HASH=${AUTH_HASH}
      - ALLOWED_RANGES=${ALLOWED_RANGES:-127.0.0.1/32 ::1/128}
    networks:
      - proton-shared

  # ── Dashboard (bridge-style web panel) ─────────────────────────────────
  dashboard:
    build: ./dashboard
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker-compose.user.yml:/app/docker-compose.user.yml:ro
      - ./containers:/app/containers:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - CADDY_ADMIN=http://caddy:2019
    depends_on:
      caddy:
        condition: service_started
    networks:
      - proton-shared

volumes:
  caddy_data:
  caddy_config:

networks:
  proton-shared:
    external: true
