# Proton DAV Server — Per-User Bridge Template
#
# This file is NOT used directly. The dashboard provisions each user's
# isolated bridge stack via:
#
#   docker compose -p user-{name} -f docker-compose.user.yml up -d
#
# Each user gets their own containers, volumes, and Proton credentials.
# All containers join the shared network so Caddy can route to them.

services:
  # ── IMAP/SMTP — Proton Mail Bridge ──────────────────────────────────────
  proton-mail-bridge:
    build:
      context: ./containers/proton-mail-bridge
    restart: unless-stopped
    volumes:
      - mail_bridge_data:/root/.config/protonmail/bridge-v3
      - mail_bridge_cache:/root/.cache/protonmail/bridge-v3
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1143"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - proton-shared

  # ── CalDAV — Proton Calendar Bridge ─────────────────────────────────────
  proton-calendar-bridge:
    build:
      context: ./containers/proton-calendar-bridge
    restart: unless-stopped
    volumes:
      - calendar_bridge_data:/root/.config/proton-calendar-bridge
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9842"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proton-shared

  # ── WebDAV — rclone serve webdav (Proton Drive) ─────────────────────────
  rclone-webdav:
    image: rclone/rclone:latest
    restart: unless-stopped
    command: >
      serve webdav proton:
      --addr 0.0.0.0:9844
      --vfs-cache-mode full
      --vfs-cache-max-age 1h
    volumes:
      - rclone_config:/config/rclone
      - rclone_cache:/root/.cache/rclone
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9844/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proton-shared

  # ── CardDAV — hydroxide (experimental) ──────────────────────────────────
  hydroxide:
    build:
      context: ./containers/hydroxide
    restart: unless-stopped
    profiles:
      - carddav
    volumes:
      - hydroxide_data:/root/.config/hydroxide
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - proton-shared

volumes:
  mail_bridge_data:
  mail_bridge_cache:
  calendar_bridge_data:
  rclone_config:
  rclone_cache:
  hydroxide_data:

networks:
  proton-shared:
    external: true
