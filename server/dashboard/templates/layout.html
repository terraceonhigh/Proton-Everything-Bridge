{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proton DAV Server</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 640px; margin: 0 auto; }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #8b5cf6;
        }
        .card {
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .card-header h2 {
            font-size: 1.05rem;
            font-weight: 500;
            color: #fff;
        }
        .services {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }
        .svc {
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            background: #0f3460;
        }
        .svc.ok { color: #4ade80; }
        .svc.err { color: #f87171; }
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        a.btn, button.btn {
            display: inline-block;
            padding: 0.4rem 0.85rem;
            border-radius: 8px;
            font-size: 0.85rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-primary {
            background: #8b5cf6;
            color: #fff;
        }
        .btn-primary:hover { background: #7c3aed; }
        .btn-secondary {
            background: #2a2a4a;
            color: #d0d0d0;
        }
        .btn-secondary:hover { background: #3a3a5a; }
        .btn-danger {
            background: #991b1b;
            color: #fca5a5;
        }
        .btn-danger:hover { background: #b91c1c; }
        .add-form {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .add-form input {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            background: #0f3460;
            color: #e0e0e0;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .add-form input::placeholder { color: #666; }
        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
        }
        .back { margin-bottom: 1rem; display: inline-block; color: #8b5cf6; text-decoration: none; }
        .back:hover { text-decoration: underline; }
        .endpoint {
            background: #0f3460;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 0.6rem 0.85rem;
            font-family: monospace;
            font-size: 0.85rem;
            margin: 0.35rem 0 1rem 0;
            word-break: break-all;
        }
        .endpoint-label {
            font-size: 0.8rem;
            color: #8b5cf6;
            margin-top: 0.75rem;
        }
        .cmd {
            background: #0a0a1a;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            margin: 0.35rem 0 1.25rem 0;
            line-height: 1.5;
        }
        .step-num {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            line-height: 1.5rem;
            text-align: center;
            border-radius: 50%;
            background: #8b5cf6;
            color: #fff;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }
        .step { margin-bottom: 0.25rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        {{template "content" .}}
    </div>
</body>
</html>
{{end}}
