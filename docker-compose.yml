# Proton Bridge Stack — Laptop Edition
#
# Lightweight orchestration of Proton bridge services.
# All ports bound to localhost only. No reverse proxy, no TLS, no dashboard.
#
# Quick start:
#   docker compose up -d
#
# First-time setup (run BEFORE 'up -d'):
#   docker compose run --rm proton-bridge protonmail-bridge --cli
#   docker compose run --rm proton-bridge proton-calendar-bridge --login
#   docker compose run --rm proton-bridge rclone config

services:
  proton-bridge:
    platform: linux/amd64
    build:
      context: ./containers/proton-bridge
    restart: unless-stopped
    ports:
      - "127.0.0.1:1143:1143"   # IMAP
      - "127.0.0.1:1025:1025"   # SMTP
      - "127.0.0.1:9842:9842"   # CalDAV
      - "127.0.0.1:9844:9844"   # WebDAV
    volumes:
      - proton_data:/data
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1143"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  proton_data:
